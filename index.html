<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Déjanos tu pregunta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="participant-page">
    <main class="participant-shell">
      <section class="ask-panel" aria-labelledby="page-title">
        <div class="brand-mark" aria-hidden="true">
          <span></span>
        </div>
        <p class="eyebrow">Capacitación en vivo</p>
        <h1 id="page-title">Déjanos tu pregunta</h1>
        <form id="questionForm" class="question-form">
          <label class="field-label" for="identityMode">Participación</label>
          <div class="select-wrap">
            <select id="identityMode" name="identityMode">
              <option value="anonymous">Anónimo</option>
              <option value="named">Mostrar mi nombre</option>
            </select>
          </div>

          <div id="nameGroup" class="form-group is-hidden">
            <label class="field-label" for="participantName">Nombre</label>
            <input id="participantName" name="participantName" type="text" autocomplete="name" maxlength="80" placeholder="Tu nombre" />
          </div>

          <div class="form-group">
            <label class="field-label" for="questionText">Pregunta</label>
            <textarea id="questionText" name="questionText" rows="6" maxlength="500" required placeholder="Escribe aquí tu pregunta"></textarea>
          </div>

          <button id="submitButton" class="primary-button" type="submit">
            <span>Enviar pregunta</span>
          </button>
        </form>
        <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>
      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
